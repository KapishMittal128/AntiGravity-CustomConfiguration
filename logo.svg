<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <style>
    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.95); }
      100% { opacity: 0.9; transform: scale(1.05); }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0px); }
    }
    .rotating-ring {
      transform-origin: 100px 100px;
      animation: rotate 25s linear infinite;
    }
    .rotating-ring-reverse {
      transform-origin: 100px 100px;
      animation: rotate 12s linear infinite reverse;
    }
    .pulsing-core {
      transform-origin: 100px 100px;
      animation: pulse 2.5s ease-in-out infinite alternate;
    }
    .floating-element {
      transform-origin: 100px 100px;
      animation: float 3s ease-in-out infinite;
    }
    .floating-text {
      animation: float 5s ease-in-out infinite;
    }
    .glow {
      filter: url(#glow-filter);
    }
  </style>
  <defs>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="100%" stop-color="#4a00e0" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#070709" rx="12" />
  
  <!-- Animated 3D-like Sphere & Orbits -->
  <g class="glow">
    <!-- Outer Orbit -->
    <circle cx="100" cy="100" r="72" fill="none" stroke="url(#purple-grad)" stroke-width="2" stroke-dasharray="12 18" class="rotating-ring" />
    <!-- Inner Orbit -->
    <circle cx="100" cy="100" r="52" fill="none" stroke="url(#emerald-grad)" stroke-width="1.5" stroke-dasharray="6 6" class="rotating-ring-reverse" />
    <!-- Pulsing Core -->
    <circle cx="100" cy="100" r="32" fill="url(#purple-grad)" class="pulsing-core" />
    <!-- Inner Arrow Core -->
    <polygon points="92,104 100,90 108,104" fill="#ffffff" class="floating-element" />
  </g>
  
  <!-- Text Section -->
  <g transform="translate(210, 105)" class="floating-text">
    <text font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="900" fill="#ffffff" letter-spacing="6">ANTIGRAVITY OS</text>
    <text font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#10b981" letter-spacing="3" y="28">HIGH-FIDELITY SOFTWARE PRODUCTION ENGINE</text>
  </g>
</svg>
